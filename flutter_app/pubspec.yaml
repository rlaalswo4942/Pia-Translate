name: pia_translate
description: Pia 오프라인 번역 — 완전 로컬 실행, 외부 서버 불필요
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ONNX Runtime — 온디바이스 모델 추론
  onnxruntime: ^1.18.0

  # 파일 시스템 — 모델 캐시 경로 관리
  path_provider: ^2.1.3
  path: ^1.9.0

  # 네트워크 — 첫 실행 시 모델 다운로드
  http: ^1.2.1
  dio: ^5.4.3+1

  # 상태 관리
  provider: ^6.1.2

  # 진행률 표시 (다운로드)
  percent_indicator: ^4.2.3

  # 음성 인식 (오프라인 Vosk STT)
  vosk_flutter: ^0.2.0

  # 보안: SHA256 해시 검증
  crypto: ^3.0.3

  # 클립보드
  flutter_clipboard_manager: ^0.0.1+1
  # 대안: clipboard: ^0.1.3

  # 공유
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/

  # 폰트 (선택 — 나눔고딕 등 한국어 폰트)
  # fonts:
  #   - family: NanumGothic
  #     fonts:
  #       - asset: assets/fonts/NanumGothic.ttf
