name: pia_translate
description: Pia 오프라인 번역 — 완전 로컬 실행, 외부 서버 불필요
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ONNX Runtime — 온디바이스 모델 추론
  onnxruntime: ^1.4.1

  # 파일 시스템 — 모델 캐시 경로 관리
  path_provider: ^2.1.3
  path: ^1.9.0

  # 네트워크 — 첫 실행 시 모델 다운로드 (dio 사용, http는 vosk_flutter 호환용)
  http: ^0.13.6
  dio: ^5.4.3+1

  # 상태 관리
  provider: ^6.1.2

  # 진행률 표시 (다운로드)
  percent_indicator: ^4.2.3

  # 음성 인식 (오프라인 Vosk STT)
  vosk_flutter: ^0.3.48

  # 보안: SHA256 해시 검증
  crypto: ^3.0.3

  # OCR — 이미지 내 텍스트 인식 (오프라인, ML Kit)
  google_mlkit_text_recognition: ^0.13.1

  # 이미지 입력 — 카메라 촬영 / 갤러리 선택
  image_picker: ^1.1.2

  # 공유
  share_plus: ^9.0.0

  # Pia 학습 데이터 수집 — 로컬 SQLite 저장 + 동의 관리
  sqflite: ^2.3.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/

  # 폰트 (선택 — 나눔고딕 등 한국어 폰트)
  # fonts:
  #   - family: NanumGothic
  #     fonts:
  #       - asset: assets/fonts/NanumGothic.ttf
