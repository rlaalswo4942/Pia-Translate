name: 빌드 & 릴리스

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리스 버전 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FLUTTER_VERSION: '3.32.2'

jobs:
  build:
    name: Android APK 빌드
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter 빌드 시스템 파일 생성
        run: |
          # 임시 스캐폴드로 Gradle 파일 추출 (우리 소스는 건드리지 않음)
          flutter create \
            --org com.pia \
            --project-name pia_translate \
            --platforms android \
            /tmp/flutter_scaffold

          TARGET=flutter_app/android

          cp /tmp/flutter_scaffold/android/build.gradle         $TARGET/
          cp /tmp/flutter_scaffold/android/settings.gradle      $TARGET/
          cp /tmp/flutter_scaffold/android/gradle.properties    $TARGET/
          cp /tmp/flutter_scaffold/android/app/build.gradle     $TARGET/app/
          cp -r /tmp/flutter_scaffold/android/gradle            $TARGET/
          cp /tmp/flutter_scaffold/android/gradlew              $TARGET/
          chmod +x $TARGET/gradlew

          # 기본 리소스 (아이콘, 테마)
          cp -r /tmp/flutter_scaffold/android/app/src/main/res/mipmap-* \
                $TARGET/app/src/main/res/ 2>/dev/null || true
          mkdir -p $TARGET/app/src/main/res/values
          cp /tmp/flutter_scaffold/android/app/src/main/res/values/styles.xml \
             $TARGET/app/src/main/res/values/ 2>/dev/null || true

          # applicationId + namespace 보정: 스캐폴드(com.pia.pia_translate) → 실제 패키지(com.pia.translate)
          sed -i 's/applicationId "com\.pia\.pia_translate"/applicationId "com.pia.translate"/' \
              $TARGET/app/build.gradle
          sed -i 's/namespace "com\.pia\.pia_translate"/namespace "com.pia.translate"/' \
              $TARGET/app/build.gradle

      - name: minSdk 21 설정
        run: |
          sed -i \
            's/minSdk flutter\.minSdkVersion/minSdk 21/' \
            flutter_app/android/app/build.gradle

      - name: 진단 빌드 — 플러그인 전부 제거 (Flutter 엔진만 테스트)
        run: |
          # pubspec.yaml → flutter SDK만 남김 (플러그인 네이티브 코드 완전 제거)
          cat > flutter_app/pubspec.yaml << 'EOF'
          name: pia_translate
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF

          # lib/ → main.dart만 남김 (나머지 파일들이 없는 패키지 임포트할 수 있으니)
          find flutter_app/lib -mindepth 1 -name "*.dart" ! -name "main.dart" -delete
          find flutter_app/lib -mindepth 1 -type d -exec rm -rf {} + 2>/dev/null || true

          echo "[OK] pubspec.yaml 최소화 완료"
          echo "[OK] lib/ 정리 완료 — main.dart 단독 빌드"

      - name: Flutter 의존성 설치
        working-directory: flutter_app
        run: flutter pub get

      - name: APK 빌드 보안 검사 — 위험 패턴 스캔
        run: |
          echo "── 하드코딩 시크릿 검사 ──"
          if grep -rn \
            -e 'api[_-]\?key\s*=\s*["'"'"'][A-Za-z0-9]{16,}' \
            -e 'password\s*=\s*["'"'"'][^"'"'"']{6,}' \
            -e 'secret\s*=\s*["'"'"'][^"'"'"']{6,}' \
            flutter_app/lib/ 2>/dev/null; then
            echo "[경고] 하드코딩된 시크릿 의심 패턴 발견 — 확인 필요"
          else
            echo "[OK] 하드코딩 시크릿 없음"
          fi

          echo "── 허용 외 도메인 하드코딩 검사 ──"
          if grep -rn 'http://' flutter_app/lib/ 2>/dev/null; then
            echo "[실패] HTTP 평문 URL 발견"
            exit 1
          else
            echo "[OK] HTTPS 전용 확인"
          fi

      - name: APK 빌드 (Release)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: APK 무결성 검증
        id: verify_apk
        run: |
          APK=flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "[실패] APK 파일이 생성되지 않았습니다"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1024 / 1024))
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          echo "[OK] APK 크기: ${SIZE_MB}MB"
          echo "[OK] APK SHA256: ${SHA256}"
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          if [ "$SIZE" -lt 5242880 ]; then
            echo "[실패] APK가 비정상적으로 작습니다 (${SIZE_MB}MB)"
            exit 1
          fi

      - name: 태그명 결정
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: GitHub Release 생성 & APK 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Pia 번역 ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: false
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Pia 번역 — 오프라인 AI 번역 앱

            > **다운로드 페이지**: https://rlaalswo4942.github.io/Pia-Translate/
            > **직접 다운로드**: [app-release.apk](https://github.com/rlaalswo4942/Pia-Translate/releases/latest/download/app-release.apk)

            인터넷 없이 폰에서 직접 번역합니다.

            ### 지원 언어
            🇰🇷 한국어 ↔ 🇺🇸 영어 · 🇯🇵 일본어 · 🇨🇳 중국어 · 🇫🇷 프랑스어

            ### 설치 방법
            1. 위 `app-release.apk` 다운로드 (또는 다운로드 페이지 방문)
            2. 폰 설정 → **알 수 없는 출처 앱 설치 허용**
            3. APK 파일을 열어 설치

            ### APK 무결성
            ```
            SHA256: ${{ steps.verify_apk.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
