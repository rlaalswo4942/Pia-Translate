name: 빌드 & 릴리스

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리스 버전 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FLUTTER_VERSION: '3.22.3'

jobs:
  build:
    name: Android APK 빌드
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Android NDK 설치
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "ndk;26.1.10909125"

      - name: Flutter 빌드 시스템 파일 생성
        run: |
          # 임시 스캐폴드로 Gradle 파일 추출 (우리 소스는 건드리지 않음)
          flutter create \
            --org com.pia \
            --project-name pia_translate \
            --platforms android \
            /tmp/flutter_scaffold

          TARGET=flutter_app/android

          cp /tmp/flutter_scaffold/android/build.gradle         $TARGET/
          cp /tmp/flutter_scaffold/android/settings.gradle      $TARGET/
          cp /tmp/flutter_scaffold/android/gradle.properties    $TARGET/
          cp /tmp/flutter_scaffold/android/app/build.gradle     $TARGET/app/
          cp -r /tmp/flutter_scaffold/android/gradle            $TARGET/
          cp /tmp/flutter_scaffold/android/gradlew              $TARGET/
          chmod +x $TARGET/gradlew

          # 기본 리소스 (아이콘, 테마)
          cp -r /tmp/flutter_scaffold/android/app/src/main/res/mipmap-* \
                $TARGET/app/src/main/res/ 2>/dev/null || true
          mkdir -p $TARGET/app/src/main/res/values
          cp /tmp/flutter_scaffold/android/app/src/main/res/values/styles.xml \
             $TARGET/app/src/main/res/values/ 2>/dev/null || true

      - name: app/build.gradle — NDK + CMake 설정 추가
        run: |
          python3 << 'PYEOF'
          path = 'flutter_app/android/app/build.gradle'
          with open(path) as f:
              src = f.read()

          # NDK 버전
          if 'ndkVersion' not in src:
              src = src.replace(
                  'compileSdk flutter.compileSdkVersion',
                  'ndkVersion "26.1.10909125"\n    compileSdk flutter.compileSdkVersion'
              )

          # ML Kit OCR 의존성 추가 (오프라인 번들)
          mlkit_deps = (
              '    implementation "com.google.mlkit:text-recognition:16.0.0"\n'
              '    implementation "com.google.mlkit:text-recognition-korean:16.0.0"\n'
              '    implementation "com.google.mlkit:text-recognition-japanese:16.0.0"\n'
              '    implementation "com.google.mlkit:text-recognition-chinese:16.0.0"\n'
          )
          if 'text-recognition' not in src:
              src = src.replace('dependencies {', 'dependencies {\n' + mlkit_deps, 1)

          # defaultConfig 내 cmake 플래그
          if 'externalNativeBuild' not in src:
              src = src.replace(
                  '        versionName flutterVersionName',
                  '        versionName flutterVersionName\n'
                  '        externalNativeBuild {\n'
                  '            cmake { cppFlags "-std=c++17" }\n'
                  '        }'
              )
              # android 블록에 cmake 경로
              src = src.replace(
                  '\n    buildTypes {',
                  '\n    externalNativeBuild {\n'
                  '        cmake {\n'
                  '            path "CMakeLists.txt"\n'
                  '            version "3.22.1"\n'
                  '        }\n'
                  '    }\n\n    buildTypes {'
              )

          with open(path, 'w') as f:
              f.write(src)
          print('[OK] app/build.gradle 수정 완료')
          PYEOF

      - name: minSdk 21 강제 설정 (Vosk 최소 요구사항)
        run: |
          sed -i \
            's/minSdk flutter\.minSdkVersion/minSdk 21/' \
            flutter_app/android/app/build.gradle

      - name: Flutter 의존성 설치
        working-directory: flutter_app
        run: flutter pub get

      - name: APK 빌드 보안 검사 — 위험 패턴 스캔
        run: |
          echo "── 하드코딩 시크릿 검사 ──"
          # API 키, 비밀번호 패턴 탐지
          if grep -rn \
            -e 'api[_-]\?key\s*=\s*["'"'"'][A-Za-z0-9]{16,}' \
            -e 'password\s*=\s*["'"'"'][^"'"'"']{6,}' \
            -e 'secret\s*=\s*["'"'"'][^"'"'"']{6,}' \
            flutter_app/lib/ 2>/dev/null; then
            echo "[경고] 하드코딩된 시크릿 의심 패턴 발견 — 확인 필요"
          else
            echo "[OK] 하드코딩 시크릿 없음"
          fi

          echo "── 허용 외 도메인 하드코딩 검사 ──"
          if grep -rn 'http://' flutter_app/lib/ 2>/dev/null; then
            echo "[실패] HTTP 평문 URL 발견"
            exit 1
          else
            echo "[OK] HTTPS 전용 확인"
          fi

      - name: APK 빌드 (Release)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: APK 무결성 검증
        id: verify_apk
        run: |
          APK=flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "[실패] APK 파일이 생성되지 않았습니다"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1024 / 1024))
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          echo "[OK] APK 크기: ${SIZE_MB}MB"
          echo "[OK] APK SHA256: ${SHA256}"
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          # 비정상적으로 작은 APK 차단 (5MB 미만이면 빌드 실패)
          if [ "$SIZE" -lt 5242880 ]; then
            echo "[실패] APK가 비정상적으로 작습니다 (${SIZE_MB}MB)"
            exit 1
          fi

      - name: 태그명 결정
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: GitHub Release 생성 & APK 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Pia 번역 ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: false
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Pia 번역 — 오프라인 AI 번역 앱

            > **다운로드 페이지**: https://rlaalswo4942.github.io/Pia-Translate/
            > **직접 다운로드**: [app-release.apk](https://github.com/rlaalswo4942/Pia-Translate/releases/latest/download/app-release.apk)

            인터넷 없이 폰에서 직접 번역합니다.

            ### 지원 언어
            🇰🇷 한국어 ↔ 🇺🇸 영어 · 🇯🇵 일본어 · 🇨🇳 중국어 · 🇫🇷 프랑스어

            ### 주요 기능
            - ⌨️ 텍스트 번역 (완전 오프라인)
            - 🎤 음성 인식 후 자동 번역 (Vosk 한국어 대형 모델)
            - 📷 이미지 텍스트 인식 후 번역 (ML Kit OCR)
            - 보안: HTTPS 전용, Zip Slip 방지, 허용 도메인 검증, 입력 길이 제한
            - 첫 실행 시 모델 자동 다운로드
              - 번역 모델: 언어쌍당 ~60MB
              - 음성 인식 모델 (한국어 대형): ~370MB

            ### 설치 방법
            1. 위 `app-release.apk` 다운로드 (또는 다운로드 페이지 방문)
            2. 폰 설정 → **알 수 없는 출처 앱 설치 허용**
            3. APK 파일을 열어 설치
            4. 앱 실행 → 필요한 모델이 자동 다운로드됨

            ### APK 무결성
            ```
            SHA256: ${{ steps.verify_apk.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
