name: 빌드 & 릴리스

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리스 버전 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FLUTTER_VERSION: '3.32.2'

jobs:
  build:
    name: Android APK 빌드
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter 빌드 시스템 파일 생성
        run: |
          # 임시 스캐폴드로 Gradle 파일 추출 (우리 소스는 건드리지 않음)
          flutter create \
            --org com.pia \
            --project-name pia_translate \
            --platforms android \
            /tmp/flutter_scaffold

          TARGET=flutter_app/android
          SRC=/tmp/flutter_scaffold/android

          # Flutter 3.24+ 는 Kotlin DSL(.kts) 사용 — .kts 우선, 없으면 .gradle 복사
          for f in build.gradle settings.gradle gradle.properties; do
            if [ -f "$SRC/${f}.kts" ]; then
              cp "$SRC/${f}.kts" "$TARGET/"
            elif [ -f "$SRC/$f" ]; then
              cp "$SRC/$f" "$TARGET/"
            fi
          done

          if [ -f "$SRC/app/build.gradle.kts" ]; then
            cp "$SRC/app/build.gradle.kts" "$TARGET/app/"
          elif [ -f "$SRC/app/build.gradle" ]; then
            cp "$SRC/app/build.gradle" "$TARGET/app/"
          fi

          cp -r "$SRC/gradle" "$TARGET/"
          cp "$SRC/gradlew" "$TARGET/"
          chmod +x "$TARGET/gradlew"

          # 기본 리소스 (아이콘, 테마)
          cp -r "$SRC/app/src/main/res/mipmap-"* \
                "$TARGET/app/src/main/res/" 2>/dev/null || true
          mkdir -p "$TARGET/app/src/main/res/values"
          cp "$SRC/app/src/main/res/values/styles.xml" \
             "$TARGET/app/src/main/res/values/" 2>/dev/null || true

          # proguard-rules.pro 복사 + Play Core dontwarn 추가
          cp "$SRC/app/proguard-rules.pro" "$TARGET/app/" 2>/dev/null || touch "$TARGET/app/proguard-rules.pro"
          echo '-dontwarn com.google.android.play.core.**' >> "$TARGET/app/proguard-rules.pro"

          # applicationId + namespace 보정 (Groovy DSL 및 Kotlin DSL 모두 처리)
          for gradle_file in "$TARGET/app/build.gradle" "$TARGET/app/build.gradle.kts"; do
            [ -f "$gradle_file" ] || continue
            # Groovy: applicationId "com.pia.pia_translate"
            sed -i 's/applicationId "com\.pia\.pia_translate"/applicationId "com.pia.translate"/' "$gradle_file"
            sed -i 's/namespace "com\.pia\.pia_translate"/namespace "com.pia.translate"/' "$gradle_file"
            # Kotlin DSL: applicationId = "com.pia.pia_translate"
            sed -i 's/applicationId = "com\.pia\.pia_translate"/applicationId = "com.pia.translate"/' "$gradle_file"
            sed -i 's/namespace = "com\.pia\.pia_translate"/namespace = "com.pia.translate"/' "$gradle_file"
          done

      - name: minSdk 21 설정
        run: |
          for gradle_file in flutter_app/android/app/build.gradle flutter_app/android/app/build.gradle.kts; do
            [ -f "$gradle_file" ] || continue
            # Groovy DSL
            sed -i 's/minSdk flutter\.minSdkVersion/minSdk 21/' "$gradle_file"
            # Kotlin DSL
            sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' "$gradle_file"
          done

      - name: pubspec.yaml + main.dart 복원 (onnxruntime 제외 전체 플러그인)
        run: |
          cat > flutter_app/pubspec.yaml << 'EOF'
          name: pia_translate
          description: Pia 오프라인 번역 — 완전 로컬 실행, 외부 서버 불필요
          publish_to: none
          version: 1.4.0+1

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            provider: ^6.1.2
            path_provider: ^2.1.3
            path: ^1.9.0
            http: ^1.2.1
            dio: ^5.4.3+1
            percent_indicator: ^4.2.3
            share_plus: ^9.0.0
            onnxruntime: ^1.18.0
            shared_preferences: ^2.2.3
            sqflite: ^2.3.3
            uuid: ^4.4.0
            image_picker: ^1.1.2
            cupertino_icons: ^1.0.6

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
            assets:
              - assets/models/
          EOF

          mkdir -p flutter_app/assets/models

          cat > flutter_app/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'screens/home_screen.dart';
          import 'services/data_collector.dart';
          import 'state/translate_notifier.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await DataCollector.instance.init();
            runApp(
              ChangeNotifierProvider(
                create: (_) => TranslateNotifier(),
                child: const PiaTranslateApp(),
              ),
            );
          }

          class PiaTranslateApp extends StatelessWidget {
            const PiaTranslateApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Pia 번역',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: const Color(0xFF1E2A3A),
                    brightness: Brightness.light,
                  ),
                  useMaterial3: true,
                ),
                home: const HomeScreen(),
              );
            }
          }
          EOF

          echo "[OK] pubspec.yaml 복원 완료"
          echo "[OK] main.dart → 실제 앱으로 교체"

      - name: app/build.gradle에 CMake(SentencePiece) 빌드 설정 추가
        run: |
          python3 - <<'PYEOF'
          import os, re

          kts   = 'flutter_app/android/app/build.gradle.kts'
          groovy= 'flutter_app/android/app/build.gradle'

          if os.path.exists(kts):
              path, is_kts = kts, True
          else:
              path, is_kts = groovy, False

          with open(path) as f:
              content = f.read()

          if 'externalNativeBuild' in content:
              print('[skip] externalNativeBuild already present')
          else:
              if is_kts:
                  block = '''
              externalNativeBuild {
                  cmake {
                      path = file("CMakeLists.txt")
                      version = "3.22.1"
                  }
              }
          '''
              else:
                  block = '''
              externalNativeBuild {
                  cmake {
                      path "CMakeLists.txt"
                      version "3.22.1"
                  }
              }
          '''
              if 'buildTypes' in content:
                  content = content.replace('    buildTypes {', block + '    buildTypes {', 1)
              else:
                  last = content.rfind('}')
                  content = content[:last] + block + content[last:]

              with open(path, 'w') as f:
                  f.write(content)
              print(f'[OK] externalNativeBuild 추가: {path}')
          PYEOF

      - name: Flutter 의존성 설치
        working-directory: flutter_app
        run: flutter pub get

      - name: APK 빌드 보안 검사 — 위험 패턴 스캔
        run: |
          echo "── 하드코딩 시크릿 검사 ──"
          if grep -rn \
            -e 'api[_-]\?key\s*=\s*["'"'"'][A-Za-z0-9]{16,}' \
            -e 'password\s*=\s*["'"'"'][^"'"'"']{6,}' \
            -e 'secret\s*=\s*["'"'"'][^"'"'"']{6,}' \
            flutter_app/lib/ 2>/dev/null; then
            echo "[경고] 하드코딩된 시크릿 의심 패턴 발견 — 확인 필요"
          else
            echo "[OK] 하드코딩 시크릿 없음"
          fi

          echo "── 허용 외 도메인 하드코딩 검사 ──"
          if grep -rn 'http://' flutter_app/lib/ 2>/dev/null; then
            echo "[실패] HTTP 평문 URL 발견"
            exit 1
          else
            echo "[OK] HTTPS 전용 확인"
          fi

      - name: APK 빌드 (Release)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: APK 무결성 검증
        id: verify_apk
        run: |
          APK=flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "[실패] APK 파일이 생성되지 않았습니다"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1024 / 1024))
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          echo "[OK] APK 크기: ${SIZE_MB}MB"
          echo "[OK] APK SHA256: ${SHA256}"
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          if [ "$SIZE" -lt 5242880 ]; then
            echo "[실패] APK가 비정상적으로 작습니다 (${SIZE_MB}MB)"
            exit 1
          fi

      - name: 태그명 결정
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: GitHub Release 생성 & APK 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Pia 번역 ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: false
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Pia 번역 — 오프라인 AI 번역 앱

            > **다운로드 페이지**: https://rlaalswo4942.github.io/Pia-Translate/
            > **직접 다운로드**: [app-release.apk](https://github.com/rlaalswo4942/Pia-Translate/releases/latest/download/app-release.apk)

            인터넷 없이 폰에서 직접 번역합니다.

            ### 지원 언어
            🇰🇷 한국어 ↔ 🇺🇸 영어 · 🇯🇵 일본어 · 🇨🇳 중국어 · 🇫🇷 프랑스어

            ### 설치 방법
            1. 위 `app-release.apk` 다운로드 (또는 다운로드 페이지 방문)
            2. 폰 설정 → **알 수 없는 출처 앱 설치 허용**
            3. APK 파일을 열어 설치

            ### APK 무결성
            ```
            SHA256: ${{ steps.verify_apk.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
